<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc66"/>
      <stop offset="50%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#e8850f"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#b36800"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d47e10"/>
      <stop offset="100%" stop-color="#8a5200"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="chartGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blockShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="topShine" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>
  <circle cx="256" cy="248" r="180" fill="none" stroke="#1e2630" stroke-width="1.5" opacity="0.5"/>

  <!-- 3D Block -->
  <g filter="url(#blockShadow)">
    <polygon points="256,100 396,182 256,264 116,182" fill="url(#topFace)"/>
    <polygon points="116,182 256,264 256,396 116,314" fill="url(#leftFace)"/>
    <polygon points="396,182 256,264 256,396 396,314" fill="url(#rightFace)"/>
  </g>

  <!-- Shine -->
  <polygon points="256,100 396,182 256,264 116,182" fill="url(#topShine)"/>

  <!-- Edge highlights -->
  <line x1="256" y1="100" x2="116" y2="182" stroke="#ffdd88" stroke-width="1.5" opacity="0.6"/>
  <line x1="256" y1="100" x2="396" y2="182" stroke="#ffdd88" stroke-width="1" opacity="0.4"/>
  <line x1="116" y1="182" x2="116" y2="314" stroke="#f7931a" stroke-width="1" opacity="0.3"/>

  <!-- Grid on top -->
  <g opacity="0.12" stroke="#0a0e14" stroke-width="1.5">
    <line x1="186" y1="141" x2="326" y2="223"/>
    <line x1="210" y1="120" x2="210" y2="200" transform="rotate(-30 210 160)"/>
    <line x1="302" y1="120" x2="302" y2="200" transform="rotate(-30 302 160)"/>
  </g>

  <!-- Chart on left face -->
  <g filter="url(#chartGlow)">
    <polyline points="148,340 178,310 208,322 238,290 258,270" fill="none" stroke="#3fb950" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="262,264 268,278 254,274" fill="#3fb950"/>
  </g>
  <circle cx="148" cy="340" r="3" fill="#3fb950" opacity="0.7"/>
  <circle cx="178" cy="310" r="3" fill="#3fb950" opacity="0.8"/>
  <circle cx="208" cy="322" r="3" fill="#3fb950" opacity="0.8"/>
  <circle cx="238" cy="290" r="3" fill="#3fb950" opacity="0.9"/>
  <circle cx="258" cy="270" r="3.5" fill="#3fb950"/>

  <!-- BTC symbol on right face -->
  <g transform="translate(326,280) scale(0.35)" opacity="0.12">
    <path d="M40,0 L40,80 M20,0 L20,80 M10,10 L45,10 C60,10 65,25 58,35 C65,40 62,58 45,58 L10,58 M10,35 L48,35 C58,35 60,48 48,50 L10,50" fill="none" stroke="#ffcc66" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Floor reflection -->
  <ellipse cx="256" cy="420" rx="100" ry="8" fill="#f7931a" opacity="0.06"/>
</svg>
